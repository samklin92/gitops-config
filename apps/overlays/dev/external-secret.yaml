apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: myapp-dev
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: db-credentials
    creationPolicy: Owner

  data:
    - secretKey: password
      remoteRef:
        key: myapp/dev/db-password
        property: password

    - secretKey: username
      remoteRef:
        key: myapp/dev/db-password
        property: username