apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: myapp-dev

namePrefix: ""

bases:
  - ../../base

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: myapp
      spec:
        replicas: 2
    target:
      kind: Deployment
      name: myapp

images:
  - name: nginx
    newTag: "1.25"

commonLabels:
  environment: dev

commonAnnotations:
  managed-by: argocd
  environment: dev
